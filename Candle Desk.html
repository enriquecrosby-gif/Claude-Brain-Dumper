<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Candle Desk</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
      <defs>
        <radialGradient id="bg" cx="50%" cy="40%" r="70%">
          <stop offset="0%" stop-color="#f8efe0"/>
          <stop offset="100%" stop-color="#d8c8ac"/>
        </radialGradient>
        <radialGradient id="flame" cx="50%" cy="70%" r="60%">
          <stop offset="0%" stop-color="#fff4bc"/>
          <stop offset="50%" stop-color="#f0b653"/>
          <stop offset="100%" stop-color="#b9543e"/>
        </radialGradient>
      </defs>
      <rect width="200" height="200" fill="url(#bg)"/>
      <ellipse cx="100" cy="78" rx="14" ry="22" fill="url(#flame)"/>
      <rect x="86" y="100" width="28" height="42" rx="4" fill="#fffaf0" stroke="#a89a7e" stroke-width="0.5"/>
      <line x1="100" y1="100" x2="100" y2="78" stroke="#5a4a31" stroke-width="1"/>
    </svg>
  </template>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="store.jsx"></script>
  <script type="text/babel" src="ai.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "library",
      "fontSize": 21,
      "lineHeight": 1.55,
      "ambient": true
    }/*EDITMODE-END*/;

    const { useState, useEffect, useCallback } = React;

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [screen, setScreen] = useState(() => location.hash.replace('#', '') || 'desk');
      const [store, _setStore] = useState(() => loadStore());
      const [toastMsg, setToastMsg] = useState('');
      const [workshopSource, setWorkshopSource] = useState(null);

      const setStore = useCallback((next) => {
        _setStore(next);
        saveStore(next);
      }, []);

      const toast = useCallback((msg) => {
        setToastMsg(msg);
        setTimeout(() => setToastMsg(''), 2400);
      }, []);

      // Persist screen in hash so reload keeps your spot.
      useEffect(() => {
        location.hash = screen;
      }, [screen]);

      // Apply theme & typography to <html>
      useEffect(() => {
        document.documentElement.dataset.theme = t.theme || 'candle';
        document.documentElement.style.setProperty('--user-font-size', (t.fontSize || 18) + 'px');
        document.documentElement.style.setProperty('--user-line-height', t.lineHeight || 1.55);
        document.body.style.fontSize = (t.fontSize || 18) + 'px';
        document.body.style.lineHeight = (t.lineHeight || 1.55);
      }, [t.theme, t.fontSize, t.lineHeight]);

      const goWorkshop = (entryId) => {
        setWorkshopSource(entryId || null);
        setScreen('workshop');
      };

      return (
        <>
          <main className="app">
            <header className="brand">
              <h1>
                {t.ambient !== false && (
                  <span className="candle-mini" aria-hidden="true">
                    <span className="flame"></span>
                    <span className="wax"></span>
                  </span>
                )}
                Candle Desk <em>— a quiet place for thoughts</em>
              </h1>
              <nav className="nav" aria-label="Sections">
                <button className={screen === 'desk' ? 'active' : ''} onClick={() => setScreen('desk')}>Desk</button>
                <button className={screen === 'river' ? 'active' : ''} onClick={() => setScreen('river')}>River</button>
                <button className={screen === 'workshop' ? 'active' : ''} onClick={() => setScreen('workshop')}>Workshop</button>
              </nav>
            </header>

            {screen === 'desk' && (
              <DeskScreen
                store={store}
                setStore={setStore}
                toast={toast}
                onJumpToWorkshop={() => goWorkshop(null)}
              />
            )}

            {screen === 'river' && (
              <RiverScreen
                store={store}
                setStore={setStore}
                toast={toast}
                onSendToWorkshop={(id) => goWorkshop(id)}
              />
            )}

            {screen === 'workshop' && (
              <WorkshopScreen
                store={store}
                setStore={setStore}
                toast={toast}
                sourceEntryId={workshopSource}
                onClearSource={() => setWorkshopSource(null)}
              />
            )}
          </main>

          <div className={'toast' + (toastMsg ? ' show' : '')}>{toastMsg}</div>

          <TweaksPanel title="Tweaks">
            <TweakSection label="Aesthetic" />
            <TweakSelect
              label="Theme"
              value={t.theme}
              options={[
                { value: 'candle',   label: 'Candle Desk (warm paper)' },
                { value: 'mountain', label: 'Mountain dawn (slate)' },
                { value: 'library',  label: 'Library at night (deep)' },
              ]}
              onChange={(v) => setTweak('theme', v)}
            />
            <TweakToggle
              label="Candle flicker"
              value={t.ambient !== false}
              onChange={(v) => setTweak('ambient', v)}
            />
            <TweakSection label="Reading comfort" />
            <TweakSlider
              label="Font size"
              value={t.fontSize}
              min={15}
              max={22}
              unit="px"
              onChange={(v) => setTweak('fontSize', v)}
            />
            <TweakSlider
              label="Line height"
              value={t.lineHeight}
              min={1.3}
              max={1.9}
              step={0.05}
              onChange={(v) => setTweak('lineHeight', v)}
            />
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
